services:
  websockify-manager:
    environment:
      - CONFIG_RELOAD_INTERVALL
      - CONFIG_API_URL
      - CONFIG_API_KEY
    ports:
      - "8080:8080"
    build:
      context: .
      dockerfile: Docker.WebsockifyManager/Dockerfile
      
  vnc:
    container_name: vnc
    image: consol/rocky-xfce-vnc:latest
    environment:
      VNC_PORT: 5901
      VNC_PW: vncpassword 
 